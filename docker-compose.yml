version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_USER: trialsense_user
      POSTGRES_PASSWORD: trialsense_password
      POSTGRES_DB: trialsense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:latest
    environment:
      NEO4J_AUTH: neo4j/trialsense_password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
      - "8233:8233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=trialsense_user
      - POSTGRES_PWD=trialsense_password
      - POSTGRES_SEEDS=db
    depends_on:
      - db

volumes:
  postgres_data:
  neo4j_data:
